<!DOCTYPE html>
<html>
<head>
  <title>SOC IOC Bulk Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🧠 SOC IOC Bulk Analyzer</h1>

<input type="file" id="fileInput">
<br><br>

<textarea id="manualInput" placeholder="Or paste comma separated IOCs"></textarea>

<br>
<button onclick="run()">Analyze</button>

<table>
  <thead>
    <tr>
      <th>IOC</th>
      <th>Type</th>
      <th>Score</th>
      <th>Severity</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script src="app.js"></script>
</body>
</html>
